[Interface]
#wireguard VPN ip address
Address = 10.10.0.1/24
PostUp = iptables -A INPUT -i eth0 -p udp --dport 51820 -j ACCEPT # enable UDP on wireguard port through main interface
PostUp = iptables -A INPUT -i wg0 -j ACCEPT # enable all packets on the input chain on wireguard interface
PostDown= iptables -D INPUT -i eth0 -p udp --dport 51820 -j ACCEPT # remove rules
PostDown = iptables -D INPUT -i wg0 -j ACCEPT
ListenPort = 51820
PrivateKey = [SERVER_PRIVATE_KEY] 

[Peer]
PublicKey = [PEER_PUBLIC_KEY]
AllowedIPs = 10.10.0.2/32

# you can add other peers down here
